name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          source /etc/profile.d/devkit-env.sh
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MonApplicationSwitch
          path: TicoRemapper.nro
