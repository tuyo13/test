name: Compilation Switch

on: [push] # Se déclenche à chaque fois que vous modifiez un fichier

jobs:
  build_nro:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest # Image contenant libnx et les outils Switch

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Compiler le projet
        run: |
          source /etc/profile.d/devkit-env.sh
          make # Lance la compilation définie dans votre Makefile[cite: 2]

      - name: Sauvegarder le binaire (.nro)
        uses: actions/upload-artifact@v4
        with:
          name: TicoRemapper-Build
          path: TicoRemapper.nro # Nom défini par la variable TARGET dans le Makefile[cite: 2]
